databaseChangeLog:
  - changeSet:
      id: 002-make-user-fields-nullable
      author: codex
      changes:
        - dropNotNullConstraint:
            tableName: users
            columnName: username
            columnDataType: VARCHAR(255)
        - dropNotNullConstraint:
            tableName: users
            columnName: password
            columnDataType: VARCHAR(255)
        - dropNotNullConstraint:
            tableName: users
            columnName: name
            columnDataType: VARCHAR(255)
        - dropNotNullConstraint:
            tableName: users
            columnName: email
            columnDataType: VARCHAR(255)
        - dropNotNullConstraint:
            tableName: users
            columnName: phone
            columnDataType: VARCHAR(255)
