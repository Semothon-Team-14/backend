databaseChangeLog:
  - changeSet:
      id: 004-seed-nationalities
      author: codex
      changes:
        - loadData:
            file: db/changelog/data/nationalities.csv
            relativeToChangelogFile: false
            tableName: nationalities
            separator: ","
            encoding: UTF-8
            columns:
              - column:
                  name: id
                  type: NUMERIC
              - column:
                  name: country_code
                  type: STRING
              - column:
                  name: country_name_english
                  type: STRING
              - column:
                  name: country_name_korean
                  type: STRING
  - changeSet:
      id: 004-seed-cities
      author: codex
      changes:
        - loadData:
            file: db/changelog/data/cities.csv
            relativeToChangelogFile: false
            tableName: cities
            separator: ","
            encoding: UTF-8
            columns:
              - column:
                  name: id
                  type: NUMERIC
              - column:
                  name: nationality_id
                  type: NUMERIC
              - column:
                  name: city_name_english
                  type: STRING
              - column:
                  name: city_name_korean
                  type: STRING
