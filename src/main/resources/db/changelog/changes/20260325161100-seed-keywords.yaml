databaseChangeLog:
  - changeSet:
      id: 20260325161100-seed-keywords
      author: codex
      changes:
        - loadData:
            file: db/changelog/data/keywords.csv
            relativeToChangelogFile: false
            tableName: keywords
            separator: ","
            encoding: UTF-8
            columns:
              - column:
                  name: id
                  type: NUMERIC
              - column:
                  name: label
                  type: STRING
              - column:
                  name: priority
                  type: NUMERIC
