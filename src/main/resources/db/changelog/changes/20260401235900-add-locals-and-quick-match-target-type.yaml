databaseChangeLog:
  - changeSet:
      id: 20260401235900-add-locals-and-quick-match-target-type
      author: codex
      changes:
        - createTable:
            tableName: locals
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_locals
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: city_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: created_date_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_by
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: updated_date_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: locals
            baseColumnNames: user_id
            constraintName: fk_locals_user
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: locals
            baseColumnNames: city_id
            constraintName: fk_locals_city
            referencedTableName: cities
            referencedColumnNames: id
        - addUniqueConstraint:
            tableName: locals
            columnNames: user_id,city_id
            constraintName: uq_locals_user_city
        - addColumn:
            tableName: quick_matches
            columns:
              - column:
                  name: target_type
                  type: VARCHAR(20)
                  defaultValue: ANY
                  constraints:
                    nullable: false
