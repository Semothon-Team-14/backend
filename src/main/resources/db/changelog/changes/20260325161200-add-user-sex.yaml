databaseChangeLog:
  - changeSet:
      id: 20260325161200-add-user-sex
      author: codex
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: sex
                  type: VARCHAR(20)
        - sql:
            sql: ALTER TABLE users ADD CONSTRAINT chk_users_sex CHECK (sex IS NULL OR sex IN ('MALE', 'FEMALE'))
