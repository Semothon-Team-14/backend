spring:
  config:
    activate:
      on-profile: main
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

app:
  openai:
    api-key: ${OPENAI_API_KEY}
  aws:
    access-key-id: ${AWS_ACCESS_KEY_ID}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY}
    region: ${AWS_REGION}
    s3-bucket: ${AWS_S3_BUCKET}
