spring:
  config:
    activate:
      on-profile: local
    import: optional:file:.env.properties
  datasource:
    url: jdbc:postgresql://localhost:5432/semobackend
    username: semo
    password: secret

app:
  openai:
    api-key: ${OPENAI_API_KEY:}
  aws:
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    region: ${AWS_REGION:}
    s3-bucket: ${AWS_S3_BUCKET:}
