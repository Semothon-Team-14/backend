spring:
  application:
    name: backend
  messages:
    encoding: UTF-8
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8

server:
  tomcat:
    uri-encoding: UTF-8

logging:
  charset:
    console: UTF-8
    file: UTF-8

app:
  openai:
    api-key: ${OPENAI_API_KEY:}
    translation-model: ${OPENAI_TRANSLATION_MODEL:gpt-4o-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

springdoc:
  api-docs:
    path: /api-docs
  enable-data-rest: false
  enable-hateoas: false
  swagger-ui:
    path: /swagger-ui.html
