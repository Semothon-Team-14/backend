spring:
  application:
    name: backend
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

springdoc:
  api-docs:
    path: /api-docs
  enable-data-rest: false
  enable-hateoas: false
  swagger-ui:
    path: /swagger-ui.html
