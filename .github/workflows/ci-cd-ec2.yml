name: ci-cd-ec2

on:
  pull_request:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    env:
      APP_NAME: semo-backend
      APP_DIR: /opt/semo-backend
      CONTAINER_NAME: semo-backend
      IMAGE_ARCHIVE: semo-backend.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t "$APP_NAME:${GITHUB_SHA}" .

      - name: Save Docker image
        run: docker save "$APP_NAME:${GITHUB_SHA}" | gzip > "$IMAGE_ARCHIVE"

      - name: Copy Docker image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ${{ env.IMAGE_ARCHIVE }}
          target: /tmp

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: APP_NAME,APP_DIR,CONTAINER_NAME,IMAGE_ARCHIVE,GITHUB_SHA
          script: |
            sudo mkdir -p "$APP_DIR"
            cat <<EOF | sudo tee "$APP_DIR/.env" >/dev/null
            SPRING_PROFILES_ACTIVE=main
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF

            sudo docker load --input "/tmp/$IMAGE_ARCHIVE"
            sudo docker rm -f "$CONTAINER_NAME" || true
            sudo docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --env-file "$APP_DIR/.env" \
              -p 8080:8080 \
              "$APP_NAME:${GITHUB_SHA}"
            rm -f "/tmp/$IMAGE_ARCHIVE"

            for attempt in $(seq 1 24); do
              container_status=$(sudo docker inspect -f '{{.State.Status}}' "$CONTAINER_NAME" 2>/dev/null || true)
              if [ "$container_status" = "exited" ] || [ "$container_status" = "dead" ]; then
                sudo docker ps -a
                sudo docker logs "$CONTAINER_NAME"
                exit 1
              fi

              if curl -fsS "http://127.0.0.1:8080/swagger-ui.html" >/dev/null; then
                exit 0
              fi
              sleep 5
            done

            sudo docker ps -a
            sudo docker inspect "$CONTAINER_NAME" || true
            sudo docker logs "$CONTAINER_NAME"
            exit 1
